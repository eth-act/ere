[package]
name = "ere-openvm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
eyre.workspace = true
thiserror.workspace = true

# OpenVM dependencies
openvm-build.workspace = true
openvm-circuit = { workspace = true, optional = true }
openvm-sdk = { workspace = true, features = ["nightly-features"], default-features = true, optional = true }

# Local dependencies
ere-compile-utils = { workspace = true, optional = true }
ere-verifier-openvm = { workspace = true, optional = true }
ere-zkvm-interface.workspace = true

[target.'cfg(target_arch = "x86_64")'.dependencies]
openvm-sdk = { workspace = true, features = ["aot", "nightly-features"], optional = true }

[dev-dependencies]
ere-test-utils = { workspace = true, features = ["host"] }

[features]
default = ["compiler", "zkvm"]
compiler = ["dep:ere-compile-utils"]
zkvm = [
    "dep:openvm-circuit",
    "dep:openvm-sdk",
    "dep:ere-verifier-openvm",
]
cuda = ["openvm-sdk/cuda"]

[lints]
workspace = true
