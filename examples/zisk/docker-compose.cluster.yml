services:
  zisk-coordinator:
    image: ghcr.io/eth-act/ere/ere-cluster-zisk:latest-cuda
    command:
      - "zisk-coordinator"
    ports:
      - "7000:7000"
    environment:
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  zisk-worker-0:
    image: ghcr.io/eth-act/ere/ere-cluster-zisk:latest-cuda
    command:
      - "zisk-worker"
      - "--coordinator-url"
      - "http://zisk-coordinator:50051"
      - "--gpu"
    environment:
      - RUST_LOG=info
    restart: unless-stopped
    depends_on:
      zisk-coordinator:
        condition: service_healthy
    shm_size: 32G
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD", "pgrep", "-f", "zisk-worker"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

  # Uncomment to add more workers if more GPUs are available.
  # zisk-worker-x:
  #   extends: zisk-worker-0
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             device_ids: ['x']
  #             capabilities: [gpu]

networks:
  default:
