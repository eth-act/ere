name: Rust Checks
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs: 
  check-fmt:
    name: Lints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check --all

  check-tests:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        zkvm: [risc0, sp1]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-from: type=gha
          cache-to:   type=gha,mode=max
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check clippy for ere-${{ matrix.zkvm }}
        run: cargo clippy --bins --lib --examples --tests --benches -p ere-${{ matrix.zkvm }}

      - name: Check clippy for ere-dockerized with feature ${{ matrix.zkvm }}
        run: cargo clippy --bins --lib --examples --tests --benches -p ere-dockerized --features ${{ matrix.zkvm }}

      - name: Run tests (dockerized)
        run: cargo test -p ere-dockerized --features ${{ matrix.zkvm }}
