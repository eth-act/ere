name: Test and clippy common crates

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches:
      - master
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Crates tested in this workflow (all non-zkVM-specific crates).
  # zkVM-specific crates (ere-prover-{zkvm}, ere-platform-{zkvm}, ere-verifier-{zkvm}) and the
  # binary crates that depend on them # (ere-dockerized, ere-compiler, ere-server) are covered by
  # test-zkvm.yml.
  PACKAGE_FLAGS: >-
    -p ere-prover-core
    -p ere-compiler-core
    -p ere-platform-core
    -p ere-verifier-core
    -p ere-codec
    -p ere-catalog
    -p ere-util-build
    -p ere-util-compile
    -p ere-util-test
    -p ere-server-client

jobs:
  test:
    name: Test and clippy common crates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Needed to run test of ere-server-client (proto generation test)
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run cargo fmt
        run: cargo fmt --check

      - name: Run cargo clippy
        run: cargo clippy --all-targets $PACKAGE_FLAGS -- -D warnings

      - name: Run cargo test
        run: cargo test --release $PACKAGE_FLAGS
