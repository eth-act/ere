name: Test and clippy common crates

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches:
      - master
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Common crates to test in this workflow 
  PACKAGE_FLAGS: >-
    -p ere-prover-core
    -p ere-compiler-core
    -p ere-platform-core
    -p ere-verifier-core
    -p ere-codec
    -p ere-catalog
    -p ere-util-build
    -p ere-util-compile
    -p ere-util-test
    -p ere-util-tokio
    -p ere-server-api
    -p ere-server-client
    -p ere-cluster-client-zisk

jobs:
  test:
    name: Test and clippy common crates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Needed to run test of ere-server-api (proto generation test)
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run cargo clippy ere-dockerized
        run: cargo clippy --all-targets --package ere-dockerized -- -D warnings

      - name: Run cargo clippy common crates
        run: cargo clippy --all-targets $PACKAGE_FLAGS -- -D warnings

      - name: Run cargo test common crates
        run: cargo test --release $PACKAGE_FLAGS
